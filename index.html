<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Invito al mio compleanno</title>
  <style>
    :root{
      --accent:#e53e3e;
      --bg:#fff9f8;
      --text:#222;
    }
    html,body{height:100%;margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial;background:var(--bg);color:var(--text)}
    main{min-height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center}
    h1 i{font-style:italic}
    p{max-width:40rem;margin:1rem 0}
    .btn{
      background:var(--accent);color:white;border:0;padding:.9rem 1.4rem;font-size:1.05rem;border-radius:10px;cursor:pointer;
      box-shadow:0 6px 18px rgba(0,0,0,.12);transition:transform .12s ease,box-shadow .12s ease;
    }
    .btn:active{transform:translateY(1px)}

    /* popup window styles - responsive */
    .popup{
      position:fixed;background:#fff;border:3px solid #222;box-shadow:0 10px 30px rgba(0,0,0,.4);padding:12px;font-family:Segoe UI, Tahoma, Arial;z-index:1000;display:flex;flex-direction:column;gap:8px;
      width: min(90vw, 440px); max-height: 80vh; overflow:auto; box-sizing:border-box;
    }
    .popup .title{
      font-weight:700;background:#c0392b;color:#fff;padding:8px 10px;border-radius:4px;display:flex;justify-content:space-between;align-items:center;font-size:1rem
    }
    .popup .body{background:#fff;padding:10px;border-radius:4px;color:#111}
    .close-btn{background:#fff;border:1px solid #888;padding:8px 12px;border-radius:6px;cursor:pointer;font-size:1rem}

    /* final modal */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:2000}
    .modal{background:#fff;padding:20px;border-radius:8px;max-width:560px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,.5);}
    .modal h2{margin-top:0}
    .rules{margin-top:12px;padding:10px;border:1px dashed #ccc;border-radius:6px}
    .rules li{margin:6px 0}

    /* Respect prefers-reduced-motion */
    @media (prefers-reduced-motion:reduce){
      .confetti{display:none}
      .popup{transition:none}
    }

    /* small canvas cover for confetti */
    canvas.confetti{position:fixed;left:0;top:0;width:100%;height:100%;pointer-events:none;z-index:9999}
  </style>
</head>
<body>
  <main>
    <h1><i>Ciao amici.</i></h1>
    <p>Volevo rendere l'invito per il mio compleanno più strano possibile quindi &gt;&gt;&gt;&gt;&gt;&gt;&gt;&gt;</p>

    <button id="surpriseBtn" class="btn" aria-live="polite" aria-pressed="false" aria-label="Clicca per la sorpresa">
      Cliccami
    </button>

    <div id="message" class="surprise" role="status" aria-hidden="true">...</div>
  </main>

  <canvas class="confetti" id="confettiCanvas" aria-hidden="true"></canvas>

  <script>
    // Mobile-friendly improvements:
    // - responsive popups
    // - larger touch targets
    // - single AudioContext reused (created on first user gesture)
    // - particle limit on small screens

    const btn = document.getElementById('surpriseBtn');
    const msg = document.getElementById('message');
    const canvas = document.getElementById('confettiCanvas');
    const ctx = canvas.getContext('2d');

    function resize() {
      canvas.width = innerWidth * devicePixelRatio;
      canvas.height = innerHeight * devicePixelRatio;
      canvas.style.width = innerWidth + 'px';
      canvas.style.height = innerHeight + 'px';
      ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
    }
    addEventListener('resize', resize);
    resize();

    let particles = [];
    function spawnConfetti(x, y){
      const max = innerWidth < 600 ? 30 : 80; // limit on small screens
      const colors = ['#ff6b6b','#ffd166','#6bcB77','#6ec1ff','#c6a0ff'];
      const count = Math.min(max, 40);
      for(let i=0;i<count;i++){
        particles.push({x, y, vx: (Math.random()-0.5)*6, vy: (Math.random()*-5)-1, size: Math.random()*8+6, color: colors[Math.floor(Math.random()*colors.length)], rot: Math.random()*360, life: Math.random()*80+40});
      }
    }
    function tick(){
      ctx.clearRect(0,0,innerWidth,innerHeight);
      for(let i=particles.length-1;i>=0;i--){
        const p = particles[i];
        p.vy += 0.18; p.x += p.vx; p.y += p.vy; p.rot += p.vx*2; p.life--;
        ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rot * Math.PI/180); ctx.fillStyle = p.color; ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size*0.6); ctx.restore();
        if(p.y > innerHeight + 50 || p.life <= 0) particles.splice(i,1);
      }
      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);

    const reduced = matchMedia('(prefers-reduced-motion:reduce)').matches;

    // single AudioContext reused for mobile compatibility
    let audioCtx = null;
    function ensureAudio(){
      if(!audioCtx){
        try{ audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }catch(e){ audioCtx = null; }
      }
      if(audioCtx && audioCtx.state === 'suspended'){
        // resume on user gesture
        audioCtx.resume().catch(()=>{});
      }
      return audioCtx;
    }

    function playXPSound(){
      const ctxA = ensureAudio();
      if(!ctxA) return;
      const now = ctxA.currentTime;
      const o1 = ctxA.createOscillator();
      const o2 = ctxA.createOscillator();
      const g = ctxA.createGain();
      o1.type = 'sine'; o2.type = 'sine';
      o1.frequency.setValueAtTime(880, now);
      o2.frequency.setValueAtTime(1046.5, now);
      o1.connect(g); o2.connect(g); g.connect(ctxA.destination);
      g.gain.setValueAtTime(0, now);
      g.gain.linearRampToValueAtTime(0.22, now + 0.01);
      g.gain.exponentialRampToValueAtTime(0.001, now + 1.2);
      o1.start(now); o2.start(now + 0.02);
      o1.stop(now + 1.1); o2.stop(now + 1.1);
    }

    function playShortBeep(freq){
      const ctxA = ensureAudio();
      if(!ctxA) return;
      const now = ctxA.currentTime;
      const o = ctxA.createOscillator();
      const g = ctxA.createGain();
      o.type = 'square'; o.frequency.value = freq;
      o.connect(g); g.connect(ctxA.destination);
      g.gain.setValueAtTime(0.0001, now);
      g.gain.exponentialRampToValueAtTime(0.12, now + 0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, now + 0.25);
      o.start(now); o.stop(now + 0.25);
    }

    // create popup with responsive size and clamped position
    function createPopup(size, left, top, zIndex){
      const win = document.createElement('div');
      win.className = 'popup';
      // let CSS handle width; but keep optional min size via style
      if(window.innerWidth > 480){
        win.style.width = Math.min(size[0], 440) + 'px';
        win.style.height = size[1] + 'px';
      } else {
        win.style.width = '90vw';
        win.style.height = 'auto';
      }
      // clamp positions so they stay on screen
      const w = parseInt(win.style.width,10) || Math.min(size[0], 440);
      const h = parseInt(win.style.height,10) || size[1];
      const clampedLeft = Math.min(Math.max(8, left), Math.max(8, innerWidth - w - 8));
      const clampedTop = Math.min(Math.max(8, top), Math.max(8, innerHeight - h - 8));
      win.style.left = clampedLeft + 'px';
      win.style.top = clampedTop + 'px';
      win.style.zIndex = zIndex;

      const title = document.createElement('div');
      title.className = 'title';
      title.innerHTML = '<span>ERROR 404</span>';

      const close = document.createElement('button');
      close.className = 'close-btn';
      close.setAttribute('aria-label','Chiudi finestra');
      close.textContent = 'Chiudi';
      close.addEventListener('click', ()=>{
        win.remove();
        // show final message once when user closes at least one
        if(!finalShown){ finalShown = true; showFinalModal(); }
      });
      title.appendChild(close);

      const body = document.createElement('div');
      body.className = 'body';
      body.textContent = 'SEI STATO HACKERATO';

      win.appendChild(title);
      win.appendChild(body);
      document.body.appendChild(win);

      // entrance animation (prefer transform for performance)
      win.animate([{opacity:0, transform:'translateY(-6px) scale(.98)'},{opacity:1, transform:'translateY(0) scale(1)'}],{duration:220,fill:'forwards',easing:'cubic-bezier(.2,.8,.2,1)'});

      return win;
    }

    function showFinalModal(){
      playXPSound();

      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay';

      const modal = document.createElement('div');
      modal.className = 'modal';

      const h = document.createElement('h2');
      h.textContent = 'Dai che scherzo====)))';
      const p = document.createElement('p');
      p.textContent = 'Sei stato invitato al mio compleanno, che si terrà a Sogliano nella piscina comunale.';

      const rulesTitle = document.createElement('h3');
      rulesTitle.textContent = 'Regole';
      const rules = document.createElement('ul');
      rules.className = 'rules';

      const r1 = document.createElement('li');
      r1.textContent = '1) Chi pacca è Gaetano';
      const r2 = document.createElement('li');
      r2.textContent = '2) No WEED.';

      rules.appendChild(r1); rules.appendChild(r2);

      const ok = document.createElement('button');
      ok.textContent = 'OK';
      ok.className = 'close-btn';
      ok.style.marginTop = '12px';
      ok.addEventListener('click', ()=>{ overlay.remove(); });

      modal.appendChild(h); modal.appendChild(p); modal.appendChild(rulesTitle); modal.appendChild(rules); modal.appendChild(ok);
      overlay.appendChild(modal);
      document.body.appendChild(overlay);
    }

    let finalShown = false;

    btn.addEventListener('click', (e) => {
      // ensure audio context created/resumed on user gesture
      ensureAudio();

      // prevent repeated clicks
      btn.disabled = true;

      // spawn confetti for fun if not reduced motion and not too small
      if(!reduced){
        const rect = btn.getBoundingClientRect();
        spawnConfetti(rect.left + rect.width/2, rect.top + rect.height/2);
      }

      // play initial sound
      playXPSound();

      // sizes for four windows: increasing
      const sizes = [[200,110],[260,140],[340,180],[440,220]];
      const cx = innerWidth/2, cy = innerHeight/2;

      sizes.forEach((s, i) => {
        setTimeout(()=>{
          const computedWidth = window.innerWidth > 480 ? Math.min(s[0], 440) : Math.round(window.innerWidth * 0.9);
          const left = Math.max(8, cx - computedWidth/2 + (i-1.5)*24);
          const top = Math.max(8, cy - s[1]/2 + (i-1.5)*16);
          createPopup(s, left, top, 1000 + i);
          if(!reduced) playShortBeep(420 + i*60);
        }, i * 420);
      });

      // re-enable button after a bit
      setTimeout(()=>{ btn.disabled = false; }, 4000);
    });

  </script>
</body>
</html>
