<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Invito al mio compleanno</title>
  <style>
    :root{
      --accent:#e53e3e;
      --bg:#fff9f8;
      --text:#222;
    }
    html,body{height:100%;margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial;background:var(--bg);color:var(--text)}
    main{min-height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center}
    h1 i{font-style:italic}
    p{max-width:40rem;margin:1rem 0}
    .btn{
      background:var(--accent);color:white;border:0;padding:.8rem 1.2rem;font-size:1.05rem;border-radius:10px;cursor:pointer;
      box-shadow:0 6px 18px rgba(0,0,0,.12);transition:transform .12s ease,box-shadow .12s ease;
    }
    .btn:active{transform:translateY(1px)}

    /* popup window styles */
    .popup{
      position:fixed;background:#fff;border:3px solid #222;box-shadow:0 10px 30px rgba(0,0,0,.4);padding:12px;font-family:Segoe UI, Tahoma, Arial;z-index:1000;display:flex;flex-direction:column;gap:8px;
    }
    .popup .title{
      font-weight:700;background:#c0392b;color:#fff;padding:6px 10px;border-radius:4px;display:flex;justify-content:space-between;align-items:center;font-size:1rem
    }
    .popup .body{background:#fff;padding:8px;border-radius:4px;color:#111}
    .close-btn{background:#fff;border:1px solid #888;padding:2px 6px;border-radius:3px;cursor:pointer}

    /* final modal */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:2000}
    .modal{background:#fff;padding:20px;border-radius:8px;max-width:560px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,.5);}
    .modal h2{margin-top:0}
    .rules{margin-top:12px;padding:10px;border:1px dashed #ccc;border-radius:6px}
    .rules li{margin:6px 0}

    /* Respect prefers-reduced-motion */
    @media (prefers-reduced-motion:reduce){
      .confetti{display:none}
      .popup{transition:none}
    }

    /* small canvas cover for confetti (kept from previous) */
    canvas.confetti{position:fixed;left:0;top:0;width:100%;height:100%;pointer-events:none;z-index:9999}
  </style>
</head>
<body>
  <main>
    <h1><i>Ciao amici.</i></h1>
    <p>Volevo rendere l'invito per il mio compleanno più strano possibile quindi &gt;&gt;&gt;&gt;&gt;&gt;&gt;&gt;</p>

    <button id="surpriseBtn" class="btn" aria-live="polite" aria-pressed="false" aria-label="Clicca per la sorpresa">
      Cliccami
    </button>

    <div id="message" class="surprise" role="status" aria-hidden="true">...</div>
  </main>

  <canvas class="confetti" id="confettiCanvas" aria-hidden="true"></canvas>

  <script>
    // Minimal confetti using canvas and particles (kept for fun)
    const btn = document.getElementById('surpriseBtn');
    const msg = document.getElementById('message');
    const canvas = document.getElementById('confettiCanvas');
    const ctx = canvas.getContext('2d');

    function resize() {
      canvas.width = innerWidth * devicePixelRatio;
      canvas.height = innerHeight * devicePixelRatio;
      canvas.style.width = innerWidth + 'px';
      canvas.style.height = innerHeight + 'px';
      ctx.scale(devicePixelRatio, devicePixelRatio);
    }
    addEventListener('resize', resize);
    resize();

    let particles = [];
    function spawnConfetti(x, y){
      const colors = ['#ff6b6b','#ffd166','#6bcB77','#6ec1ff','#c6a0ff'];
      for(let i=0;i<80;i++){
        particles.push({x, y, vx: (Math.random()-0.5)*8, vy: (Math.random()*-6)-2, size: Math.random()*10+6, color: colors[Math.floor(Math.random()*colors.length)], rot: Math.random()*360, life: Math.random()*80+40});
      }
    }
    function tick(){
      ctx.clearRect(0,0,innerWidth,innerHeight);
      for(let i=particles.length-1;i>=0;i--){
        const p = particles[i];
        p.vy += 0.18; p.x += p.vx; p.y += p.vy; p.rot += p.vx*2; p.life--;
        ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rot * Math.PI/180); ctx.fillStyle = p.color; ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size*0.6); ctx.restore();
        if(p.y > innerHeight + 50 || p.life <= 0) particles.splice(i,1);
      }
      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);

    const reduced = matchMedia('(prefers-reduced-motion:reduce)').matches;

    // --- New behavior: spawn 4 error windows in sequence ---
    let closedCount = 0;
    let finalShown = false;

    function playXPSound(){
      // Approximate XP error sound using WebAudio (two tones + decay)
      try{
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const now = ctx.currentTime;
        const o1 = ctx.createOscillator();
        const o2 = ctx.createOscillator();
        const g = ctx.createGain();
        o1.type = 'sine'; o2.type = 'sine';
        o1.frequency.setValueAtTime(880, now); // A5
        o2.frequency.setValueAtTime(1046.5, now); // C6
        o1.connect(g); o2.connect(g); g.connect(ctx.destination);
        g.gain.setValueAtTime(0, now);
        g.gain.linearRampToValueAtTime(0.25, now + 0.01);
        g.gain.exponentialRampToValueAtTime(0.001, now + 1.2);
        o1.start(now); o2.start(now + 0.02);
        o1.stop(now + 1.3); o2.stop(now + 1.3);
      }catch(e){
        // ignore if audio not allowed
        console.warn('Audio not available', e);
      }
    }

    function createPopup(size, left, top, zIndex){
      const win = document.createElement('div');
      win.className = 'popup';
      win.style.width = size[0] + 'px';
      win.style.height = size[1] + 'px';
      win.style.left = left + 'px';
      win.style.top = top + 'px';
      win.style.zIndex = zIndex;

      const title = document.createElement('div');
      title.className = 'title';
      title.innerHTML = '<span>ERROR 404</span>';

      const close = document.createElement('button');
      close.className = 'close-btn';
      close.textContent = 'Chiudi';
      close.addEventListener('click', ()=>{
        win.remove();
        closedCount++;
        // when at least one window closed, show final message (once)
        if(!finalShown){
          finalShown = true;
          showFinalModal();
        }
      });
      title.appendChild(close);

      const body = document.createElement('div');
      body.className = 'body';
      body.textContent = 'SEI STATO HACKERATO';

      win.appendChild(title);
      win.appendChild(body);
      document.body.appendChild(win);

      // small entrance animation
      win.animate([{opacity:0, transform:'scale(0.85)'},{opacity:1, transform:'scale(1)'}],{duration:220,fill:'forwards',easing:'ease-out'});

      return win;
    }

    function showFinalModal(){
      // play sound too
      playXPSound();

      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay';

      const modal = document.createElement('div');
      modal.className = 'modal';

      const h = document.createElement('h2');
      h.textContent = 'Dai che scherzo====)))';
      const p = document.createElement('p');
      p.textContent = 'Sei stato invitato al mio compleanno, che si terrà a Sogliano nella piscina comunale.';

      const rulesTitle = document.createElement('h3');
      rulesTitle.textContent = 'Regole';
      const rules = document.createElement('ul');
      rules.className = 'rules';

      const r1 = document.createElement('li');
      r1.textContent = '1) Chi pacca è ';
      const r2 = document.createElement('li');
      r2.textContent = '2) No WEED.';

      rules.appendChild(r1); rules.appendChild(r2);

      const ok = document.createElement('button');
      ok.textContent = 'OK';
      ok.className = 'close-btn';
      ok.style.marginTop = '12px';
      ok.addEventListener('click', ()=>{ overlay.remove(); });

      modal.appendChild(h); modal.appendChild(p); modal.appendChild(rulesTitle); modal.appendChild(rules); modal.appendChild(ok);
      overlay.appendChild(modal);
      document.body.appendChild(overlay);
    }

    btn.addEventListener('click', () => {
      // prevent repeated clicks
      btn.disabled = true;

      // spawn confetti for fun if not reduced motion
      if(!reduced){
        const rect = btn.getBoundingClientRect();
        spawnConfetti(rect.left + rect.width/2, rect.top + rect.height/2);
      }

      // play initial sound
      playXPSound();

      // sizes for four windows: increasing
      const sizes = [[200,110],[260,140],[340,180],[440,220]];
      // positions (centered with offsets)
      const cx = innerWidth/2, cy = innerHeight/2;

      sizes.forEach((s, i) => {
        setTimeout(()=>{
          // random slight offset
          const left = Math.max(10, cx - s[0]/2 + (i-1.5)*30);
          const top = Math.max(10, cy - s[1]/2 + (i-1.5)*20);
          createPopup(s, left, top, 1000 + i);
          // play a short beep for each popup (staggered)
          if(!reduced) playShortBeep(400 + i*80);
        }, i * 420);
      });

      // re-enable button after a bit if you want
      setTimeout(()=>{ btn.disabled = false; }, 4000);
    });

    function playShortBeep(freq){
      try{
        const actx = new (window.AudioContext || window.webkitAudioContext)();
        const o = actx.createOscillator();
        const g = actx.createGain();
        o.type = 'square'; o.frequency.value = freq;
        o.connect(g); g.connect(actx.destination);
        g.gain.setValueAtTime(0.0001, actx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.15, actx.currentTime + 0.01);
        g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime + 0.25);
        o.start(); o.stop(actx.currentTime + 0.3);
      }catch(e){ }
    }

  </script>
</body>
</html>
